name: media_manager
description: "家庭影院系统移动端"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 路由
  go_router: ^13.2.4

  # 网络
  dio: ^5.4.3+1

  # 本地存储
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # 视频播放
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  # 图片预览
  photo_view: ^0.15.0

  # 图片缓存
  cached_network_image: ^3.3.1

  # 骨架屏
  shimmer: ^3.0.0

  # 亮度控制
  screen_brightness: ^0.2.1+1

  # 音量控制
  volume_controller: ^2.0.7

  # DLNA 投屏（XML 解析）
  xml: ^6.5.0

  # 文件选择
  file_picker: ^8.0.0

  # UUID 生成
  uuid: ^4.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.2
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
